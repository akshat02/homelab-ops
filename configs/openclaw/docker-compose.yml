services:
  openclaw-agent:
    image: ghcr.io/openclaw/openclaw:2026.5.22
    container_name: openclaw-agent
    command: openclaw gateway run
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]
    mem_limit: 2g
    cpus: "1.5"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "18789:18789"
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_TOKEN_USER=${TELEGRAM_TOKEN_USER}
    volumes:
      - ./agents/user/data:/home/node/.openclaw:rw
      - <HOME>:/host-home:ro
    tmpfs:
      - /tmp
    networks: [openclaw-net]
    secrets:
      - obsidian_key
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: openclaw-docker-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1   # allow container inspection
      POST: 1         # allow start/stop/restart
      INFO: 1         # allow system info
      STATS: 1        # allow querying resource usage
    networks: [openclaw-net]
    restart: always

networks:
  openclaw-net:
    driver: bridge
    internal: false

secrets:
  obsidian_key:
    file: ./secrets/obsidian_key
